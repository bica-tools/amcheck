name: ci

on:
  push:
    branches: [main]
    paths-ignore: # the daily watchlist commits these; no need to re-run CI
      - "SCOREBOARD.md"
      - "watchlist-state.tsv"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
